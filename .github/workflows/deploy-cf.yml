name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        env:
          VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
          VITE_VISION_API_KEY: ${{ secrets.VITE_VISION_API_KEY }}
          VITE_VISION_BASE_URL: ${{ secrets.VITE_VISION_BASE_URL }}
          VITE_VISION_MODEL: ${{ secrets.VITE_VISION_MODEL }}
      - run: npm run build
        env:
          VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
          VITE_VISION_API_KEY: ${{ secrets.VITE_VISION_API_KEY }}
          VITE_VISION_BASE_URL: ${{ secrets.VITE_VISION_BASE_URL }}
          VITE_VISION_MODEL: ${{ secrets.VITE_VISION_MODEL }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=lifepath-kline --branch=main
